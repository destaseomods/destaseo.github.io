---
title: Home
---

<div class="max-w-6xl mx-auto px-6 py-10">
  <h1 class="text-4xl font-bold text-center mb-10 neon-text">🔥 Mod Terbaru</h1>
  
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    {% for post in site.posts %}
    <div class="bg-zinc-900 border border-zinc-700 rounded-2xl overflow-hidden hover:border-cyan-500 transition-all card-hover">
      <div class="h-52 bg-gradient-to-br from-purple-600 via-cyan-600 to-blue-600 flex items-center justify-center">
        <i class="fas fa-gamepad text-7xl text-white/70"></i>
      </div>
      <div class="p-6">
        <span class="text-xs uppercase tracking-widest text-red-400">{{ post.category | default: 'Mod' }}</span>
        <h2 class="text-xl font-semibold mt-2 line-clamp-2">{{ post.title }}</h2>
        <p class="text-zinc-400 text-sm mt-3 line-clamp-3">{{ post.excerpt }}</p>
        
        <div class="mt-5 flex justify-between items-center">
          <a href="{{ post.url }}" class="text-cyan-400 font-medium hover:underline">
            Detail & Download →
          </a>
          <span class="text-xs text-zinc-500">{{ post.date | date: "%d %b %Y" }}</span>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
